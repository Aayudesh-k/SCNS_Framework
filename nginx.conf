events {}

http {
    upstream edge_cluster {
        server edge_node:8001; 
    }

    server {
        listen 80;

        location / {
            proxy_pass http://edge_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # --- AI INFERENCE TIMEOUT FIX ---
            # Tell Nginx to wait up to 10 minutes (600s) for the LLM to finish thinking
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
        }
    }
}